<!DOCTYPE html>
<!--
	Versao orientada por JSON.

	Ideia pedagogica:
	- O HTML fica responsavel pela estrutura da pagina.
	- O arquivo assets/data/carreira.json guarda os textos e listas editaveis.
	- O JavaScript le o JSON e preenche os espacos marcados com id.

	Observacao:
	- Em servidores como GitHub Pages, o fetch do JSON funciona normalmente.
	- Ao abrir direto pelo arquivo local, alguns navegadores bloqueiam o fetch.
-->
<html lang="pt-BR">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<title>Mapa de Carreira</title>
	<meta name="description" content="Mapa de carreira com dados carregados de um arquivo JSON.">
	<meta name="robots" content="index, follow">
	<meta name="theme-color" content="#0a4a73">
	<link rel="shortcut icon" href="favicon.ico">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700,900&display=swap" rel="stylesheet">
	<link id="theme-style" rel="stylesheet" href="assets/css/bootstrap-6.css">
	<link rel="stylesheet" href="assets/css/animations.css">
	<!-- Fundo de mar com ondas animadas + animacoes de scroll -->
	<link rel="stylesheet" href="assets/css/ondas.css">
	<style>
		.skip-link {
			left: 1rem;
			position: absolute;
			top: -4rem;
			z-index: 1000;
		}

		.skip-link:focus {
			top: 1rem;
		}

		.profile-picture {
			height: 220px;
			object-fit: cover;
			width: 220px;
		}

		.badge {
			margin-bottom: .35rem;
		}

		/* A cor de fundo do cabecalho (antes vinho/azul solido) agora vem
		   do arquivo assets/css/ondas.css, que aplica um gradiente de mar
		   e a camada de ondas animadas (.ocean-waves). */

		.resume-header .name,
		.resume-header .title {
			color: #ffffff !important;
		}

		.resume-header .text-link,
		#contact-list a {
			color: #ffffff !important;
			opacity: 0.85;
		}

		.resume-header .text-link:hover,
		#contact-list a:hover {
			color: #ffffff !important;
			opacity: 1;
			text-decoration: underline;
		}

		/* Aplica a mesma paleta nos elementos do corpo da pagina */
		.btn-primary {
			background-color: #157da3 !important;
			border-color: #157da3 !important;
		}

		.btn-primary:hover,
		.btn-primary:focus {
			background-color: #0a4a73 !important;
			border-color: #0a4a73 !important;
		}

		.resume-section-title {
			color: #0a4a73 !important;
		}

		.resume-section-title::after {
			background: #157da3 !important;
		}

		.theme-progress-bar-dark {
			background-color: #2fb6c4 !important;
		}

		.resume-position-title {
			color: #0a4a73 !important;
		}
	</style>
</head>

<body>
	<a class="btn btn-light skip-link" href="#conteudo-principal">Pular para o conteudo principal</a>

	<!--
		Este header tem marcadores vazios.
		O JavaScript procura cada id e injeta os dados vindos do JSON.
	-->
	<header class="resume-header pt-4 pt-md-0" role="banner">
		<div class="text-center position-relative">
			<div class="resume-wrapper-inner mx-auto text-start bg-primary shadow-lg">
				<div class="row">
					<div class="col-block col-md-auto resume-picture-holder text-center text-md-start">
						<img id="profile-photo" class="picture profile-picture" src="assets/images/profile.jpg" alt="">
					</div>

					<div class="col">
						<div class="row p-4 justify-content-center justify-content-md-between">
							<div class="primary-info col-auto">
								<h1 id="profile-name" class="name mt-0 mb-1 text-white text-uppercase">Mapa de Carreira</h1>
								<p id="profile-headline" class="title mb-3"></p>
								<ul id="contact-list" class="list-unstyled"></ul>
							</div>

							<nav class="secondary-info col-auto mt-2" aria-label="Navegacao principal">
								<ul class="resume-social list-unstyled"></ul>
								</ul>
							</nav>
						</div>
					</div>
				</div>

				<!-- Camada de ondas: dois SVGs sobrepostos, cada um animado em
					 velocidade e sentido diferentes para simular o mar. -->
				<div class="ocean-waves" aria-hidden="true">
					<svg class="wave-back" viewBox="0 0 1600 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
						<path d="M0,40 C100,90 200,0 300,40 C400,80 500,10 600,40 C700,70 800,10 900,40
							C1000,80 1100,10 1200,40 C1300,70 1400,10 1500,40 C1550,55 1580,45 1600,40
							L1600,100 L0,100 Z
							M1600,40 C1700,90 1800,0 1900,40 C2000,80 2100,10 2200,40 C2300,70 2400,10 2500,40
							C2600,80 2700,10 2800,40 C2900,70 3000,10 3100,40 C3150,55 3180,45 3200,40
							L3200,100 L1600,100 Z" fill="#ffffff"></path>
					</svg>
					<svg class="wave-front" viewBox="0 0 1600 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
						<path d="M0,60 C150,10 250,90 400,55 C500,35 600,85 700,55 C800,30 900,80 1000,55
							C1100,35 1200,85 1300,55 C1400,30 1500,75 1600,55
							L1600,100 L0,100 Z
							M1600,55 C1750,10 1850,90 2000,55 C2100,35 2200,85 2300,55 C2400,30 2500,80 2600,55
							C2700,35 2800,85 2900,55 C3000,30 3100,75 3200,55
							L3200,100 L1600,100 Z" fill="#ffffff"></path>
					</svg>
				</div>
			</div>
		</div>
	</header>

	<main id="conteudo-principal" class="resume-wrapper text-center position-relative" tabindex="-1">
		<div class="resume-wrapper-inner mx-auto text-start bg-white shadow-lg">
			<div class="resume-body p-5">
				<section id="perfil" class="resume-section summary-section mb-5" aria-labelledby="titulo-perfil">
					<h2 id="titulo-perfil" class="resume-section-title text-uppercase font-weight-bold pb-3 mb-3">
						Prazer em conhecer
					</h2>
					<div class="resume-section-content">
						<p id="profile-summary"></p>
						<a id="cv-link" class="btn btn-primary bg-primary" target="_blank" href="https://docs.google.com/document/d/1csI7rS6R1_SElNnCdIRS46UrInhWM0GC/edit?usp=drivesdk&ouid=115127146557120108574&rtpof=true&sd=true">
							Baixar curriculo em PDF
						</a>
					</div>
				</section>

				<div class="row">
					<div class="col-lg-9">
						<section id="mapa-carreira" class="resume-section experience-section mb-5"
							aria-labelledby="titulo-mapa-carreira">
							<h2 id="titulo-mapa-carreira"
								class="resume-section-title text-uppercase font-weight-bold pb-3 mb-3">
								Mapa de carreira
							</h2>

							<!-- Lista gerada a partir de careerSteps no JSON. -->
							<div class="resume-section-content">
								<div id="career-timeline" class="resume-timeline position-relative"></div>
							</div>
						</section>
					</div>

					<aside class="col-lg-3" aria-label="Informacoes complementares">
						<section id="habilidades" class="resume-section skills-section mb-5" aria-labelledby="titulo-habilidades">
							<h2 id="titulo-habilidades" class="resume-section-title text-uppercase font-weight-bold pb-3 mb-3">
								Soft e hard skills
							</h2>
							<p>Afinidade com as seguintes tecnologias e competencias:</p>
							<div id="skill-groups" class="resume-section-content"></div>
							<div class="resume-skill-item">
								<h3 class="resume-skills-cat font-weight-bold h5">Outras competencias</h3>
								<ul id="other-skills" class="list-inline"></ul>
							</div>
						</section>


					</aside>
				</div>
			</div>
		</div>
	</main>

	<!-- O defer garante que o script rode depois que o HTML existir no navegador. -->
	<script src="assets/js/carreira-json.js" defer></script>
	<script src="assets/js/scroll-animations.js" defer></script>
</body>

</html>
